<div class="glass" style="padding: 2rem; margin-bottom: 2rem;">
  <h2 style="margin-bottom: 1.5rem; color: var(--primary);">Base Resumes</h2>
  
  <div *ngIf="uploadSuccess" class="glass" style="background: rgba(16, 185, 129, 0.1); border-color: var(--secondary); color: var(--secondary); padding: 1rem; margin-bottom: 1rem;">
    {{ uploadSuccess }}
  </div>

  <div style="border: 2px dashed var(--surface-hover); padding: 2rem; text-align: center; border-radius: var(--radius-lg); margin-bottom: 2rem;">
    <p style="margin-bottom: 1rem; color: var(--text-muted);">Upload your base resume (PDF or TXT) to get started</p>
    
    <input type="file" #fileInput (change)="onFileSelected($event)" style="display: none;" accept=".txt,.pdf,.doc,.docx">
    
    <button class="btn btn-primary" (click)="fileInput.click()" [disabled]="isUploading">
      {{ isUploading ? 'Uploading...' : 'Select File' }}
    </button>
  </div>

  <div *ngIf="resumes.length > 0">
    <h3 style="margin-bottom: 1rem; font-size: 1.125rem;">Uploaded Resumes</h3>
    <div style="display: flex; flex-direction: column; gap: 0.5rem;">
      <div *ngFor="let resume of resumes" class="glass" style="padding: 1rem; display: flex; justify-content: space-between; align-items: center; background: rgba(30, 41, 59, 0.4);">
        <div style="display: flex; align-items: center; gap: 0.75rem;">
          <div style="width: 40px; height: 40px; border-radius: 50%; background: rgba(79, 70, 229, 0.2); display: flex; align-items: center; justify-content: center; color: var(--primary);">
            📄
          </div>
          <div>
            <div style="font-weight: 500;">{{ resume.name }}</div>
            <div style="font-size: 0.75rem; color: var(--text-muted);">Uploaded {{ resume.uploadedAt | date:'medium' }}</div>
          </div>
        </div>
        <button class="btn btn-secondary" style="padding: 0.25rem 0.75rem; font-size: 0.75rem;">View</button>
      </div>
    </div>
  </div>
</div>
