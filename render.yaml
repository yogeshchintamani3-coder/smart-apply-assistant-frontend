services:
  - type: static
    name: smart-apply-assistant-frontend
    env: static
    plan: free
    buildCommand: npm install && npm run build
    publishPath: dist/frontend/browser
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
